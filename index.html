<!DOCTYPE html>
<html>
<head>
    <title>Hooked | Dashboard</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #F5F5F5; }
        .hook-card { border: 1px solid rgba(0,0,0,0.05); border-radius: 16px; transition: all 0.2s; }
        .hook-card:hover { border-color: rgba(0,0,0,0.2); background: #fafafa; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [hooks, setHooks] = useState([]);

            useEffect(() => {
                const handleMessage = (e) => {
                    if (e.data.source === 'EXT_BRIDGE') {
                        setHooks(prev => [e.data.hook, ...prev]);
                    }
                };
                window.addEventListener('message', handleMessage);
                return () => window.removeEventListener('message', handleMessage);
            }, []);

            return (
                <div className="p-10 max-w-2xl mx-auto">
                    <div className="flex justify-between items-center mb-10">
                        <h1 className="text-xl font-semibold text-gray-800">Hooked</h1>
                        <span className="text-xs text-gray-400 bg-white px-3 py-1 rounded-full border border-black/5">
                            {hooks.length} Captures
                        </span>
                    </div>

                    <div className="space-y-3">
                        {hooks.length === 0 && (
                            <div className="text-center py-20 text-gray-400 border-2 border-dashed border-gray-200 rounded-2xl">
                                No hooks yet. Press Ctrl+Shift+Y to capture.
                            </div>
                        )}
                        {hooks.map(h => (
                            <div key={h.id} className="hook-card bg-white p-5 flex justify-between items-center animate-in fade-in slide-in-from-bottom-2">
                                <div>
                                    <h2 className="font-semibold text-gray-900">{h.brand}</h2>
                                    <p className="text-xs text-gray-500 truncate w-64">{h.url}</p>
                                </div>
                                <div className="text-right">
                                    <a href={h.url} target="_blank" className="text-xs font-semibold bg-black text-white px-4 py-2 rounded-lg">Open</a>
                                    <p className="text-[10px] text-gray-300 mt-2">{h.timestamp}</p>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
