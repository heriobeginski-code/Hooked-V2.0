<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hooked Dashboard</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .card-animate { animation: slideIn 0.3s ease-out; }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [hooks, setHooks] = useState([]);

            // Helper to clean URL into a Brand Name (e.g., linkedin.com -> LINKEDIN)
            const getCleanBrand = (url) => {
                try {
                    const hostname = new URL(url).hostname;
                    const name = hostname.replace('www.', '').split('.')[0];
                    return name.toUpperCase();
                } catch (e) {
                    return "LINK";
                }
            };

            useEffect(() => {
                // 1. Load initial data from localStorage
                const saved = localStorage.getItem('hooked_data');
                if (saved) {
                    try {
                        setHooks(JSON.parse(saved));
                    } catch (e) {
                        console.error("Error parsing saved data", e);
                    }
                }

                // 2. The Listener for the "Handshake" from content.js
                const handleMessage = (event) => {
                    // Check if message is coming from our extension bridge
                    if (event.data && event.data.type === "NEW_HOOKS") {
                        console.log("📥 Dashboard received new data:", event.data.data);
                        setHooks(event.data.data);
                        localStorage.setItem('hooked_data', JSON.stringify(event.data.data));
                    }
                };

                window.addEventListener("message", handleMessage);
                return () => window.removeEventListener("message", handleMessage);
            }, []);

            const clearAll = () => {
                if(confirm("Clear all saved hooks?")) {
                    localStorage.removeItem('hooked_data');
                    setHooks([]);
                }
            };

            return (
                <div className="max-w-6xl mx-auto px-6 py-12">
                    <header className="flex justify-between items-center mb-12 border-b border-gray-200 pb-6">
                        <div>
                            <h1 className="text-2xl font-bold tracking-tight text-gray-900 uppercase">
                                Hooked <span className="text-blue-600">AI</span>
                            </h1>
                            <p className="text-sm text-gray-500">Your captured insights, synced locally.</p>
                        </div>
                        <button 
                            onClick={clearAll} 
                            className="text-xs font-semibold text-gray-400 hover:text-red-500 transition tracking-widest"
                        >
                            CLEAR ALL
                        </button>
                    </header>

                    {hooks.length === 0 ? (
                        <div className="text-center py-20 border-2 border-dashed border-gray-200 rounded-2xl bg-white">
                            <p className="text-gray-400">No hooks found yet.</p>
                            <p className="text-xs text-gray-300 mt-2 italic">Press Command+Shift+S on any website to capture it.</p>
                        </div>
                    ) : (
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                            {hooks.map((hook) => (
                                <div 
                                    key={hook.id} 
                                    className="card-animate bg-white p-6 rounded-xl border border-gray-200 shadow-sm hover:shadow-md transition cursor-pointer group"
                                    onClick={() => window.open(hook.url, '_blank')}
                                >
                                    <div className="flex justify-between items-start mb-4">
                                        <span className="text-[10px] font-bold tracking-widest text-blue-600 bg-blue-50 px-2 py-1 rounded">
                                            {getCleanBrand(hook.url)}
                                        </span>
                                        <span className="text-[10px] text-gray-400 font-mono">
                                            {new Date(hook.timestamp || Date.now()).toLocaleDateString()}
                                        </span>
                                    </div>
                                   <h3 className="text-sm font-semibold text-gray-800 mb-2 truncate group-hover:text-blue-600 transition">
    {hook.url.replace(/^https?:\/\/(www\.)?/, '').replace(/\/$/, '')}
                                   </h3>
                                    </h3>
                                    <div className="mt-4 pt-4 border-t border-gray-50">
                                        <p className="text-[11px] text-gray-400 leading-relaxed italic uppercase tracking-tighter">
                                            "AI Summary pending analysis..."
                                        </p>
                                    </div>
                                </div>
                            ))}
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
