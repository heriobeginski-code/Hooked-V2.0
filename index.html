<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hooked Dashboard</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #F5F5F5; color: #1A1A1A; }
        .hook-card { background: white; border: 1px solid rgba(0,0,0,0.05); border-radius: 16px; transition: all 0.2s ease; }
        .hook-card:hover { border-color: rgba(0,0,0,0.15); transform: translateY(-1px); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [hooks, setHooks] = useState([]);

            useEffect(() => {
                const handleMessage = (event) => {
                    // This matches the updated 'source' we put in content.js
                    if (event.data && event.data.source === 'HOOKED_EXTENSION') {
                        const incoming = event.data.data;
                        
                        setHooks(prev => {
                            // Extract single item if extension sends an array
                            const newHook = Array.isArray(incoming) ? incoming[0] : incoming;
                            
                            // Prevent duplicates
                            if (!newHook || prev.some(h => h.id === newHook.id)) return prev;
                            
                            return [newHook, ...prev];
                        });
                    }
                };

                window.addEventListener('message', handleMessage);
                console.log("✅ Dashboard listening for Hooked Bridge...");

                return () => window.removeEventListener('message', handleMessage);
            }, []);

            return (
                <div className="max-w-xl mx-auto py-20 px-6">
                    <header className="flex justify-between items-center mb-12">
                        <div>
                            <h1 className="text-3xl font-bold tracking-tight">Hooked</h1>
                            <p className="text-[10px] text-gray-400 font-bold uppercase tracking-[0.2em] mt-1 text-emerald-500">
                                Engine Connected
                            </p>
                        </div>
                        
                        <div className="flex gap-3">
                            <button 
                                onClick={() => setHooks([])} 
                                className="bg-white text-red-500 text-[10px] font-bold px-4 py-2 rounded-xl border border-red-100 uppercase tracking-tighter hover:bg-red-50 transition-colors"
                            >
                                Reset
                            </button>
                            <div className="bg-white border border-black/5 px-4 py-2 rounded-full text-sm font-bold text-gray-400 shadow-sm">
                                {hooks.length}
                            </div>
                        </div>
                    </header>

                    <div className="space-y-4">
                        {hooks.length === 0 ? (
                            <div className="py-24 text-center border-2 border-dashed border-gray-200 rounded-[32px] bg-white/50">
                                <p className="text-gray-400 text-sm font-medium italic">Ready for capture. Press your shortcut on any tab.</p>
                            </div>
                        ) : (
                            hooks.map(h => (
                                <div key={h.id} className="hook-card p-6 flex justify-between items-center animate-in fade-in slide-in-from-bottom-4 duration-500 shadow-sm">
                                    <div className="truncate mr-4">
                                        <h3 className="font-bold text-gray-900 text-lg leading-tight">{h.brand}</h3>
                                        <p className="text-[11px] text-gray-400 truncate mt-1 max-w-[280px]">{h.url}</p>
                                    </div>
                                    <a 
                                        href={h.url} 
                                        target="_blank" 
                                        className="bg-black text-white text-[10px] font-black px-6 py-3 rounded-xl uppercase tracking-tighter shadow-lg shadow-black/10 hover:opacity-90 transition-opacity"
                                    >
                                        Open
                                    </a>
                                </div>
                            ))
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
