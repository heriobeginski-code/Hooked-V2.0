<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hooked Dashboard</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-gray-50 min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [hooks, setHooks] = useState([]);

            // Load initial data from localStorage
            useEffect(() => {
                const saved = localStorage.getItem('hooked_data');
                if (saved) setHooks(JSON.parse(saved));

                // Listen for the Extension Handshake
                if (window.chrome && chrome.runtime && chrome.runtime.onMessage) {
                    chrome.runtime.onMessage.addListener((message) => {
                        if (message.type === "NEW_HOOKS") {
                            setHooks(message.data);
                            localStorage.setItem('hooked_data', JSON.stringify(message.data));
                        }
                    });
                }
            }, []);

            const clearAll = () => {
                localStorage.removeItem('hooked_data');
                setHooks([]);
            };

            return (
                <div class="max-w-6xl mx-auto px-6 py-12">
                    <header class="flex justify-between items-center mb-12">
                        <h1 class="text-2xl font-bold tracking-tight text-gray-900">HOOKED <span class="text-blue-500">AI</span></h1>
                        <button onClick={clearAll} class="text-xs font-semibold text-gray-400 hover:text-red-500 transition">CLEAR ALL</button>
                    </header>

                    {hooks.length === 0 ? (
                        <div class="text-center py-20 border-2 border-dashed border-gray-200 rounded-2xl">
                            <p class="text-gray-400">No hooks found. Press Cmd+Shift+S on any website to start.</p>
                        </div>
                    ) : (
                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                            {hooks.map((hook) => (
                                <div key={hook.id} class="bg-white p-6 rounded-xl border border-gray-200 shadow-sm hover:shadow-md transition cursor-pointer" onClick={() => window.open(hook.url, '_blank')}>
                                    <div class="flex justify-between items-start mb-4">
                                        <span class="text-[10px] font-bold tracking-widest text-blue-600 bg-blue-50 px-2 py-1 rounded">{hook.brand}</span>
                                        <span class="text-[10px] text-gray-400">{new Date(hook.timestamp).toLocaleDateString()}</span>
                                    </div>
                                    <h3 class="text-sm font-semibold text-gray-800 mb-2 truncate">{hook.url}</h3>
                                    <p class="text-xs text-gray-500 leading-relaxed italic">"AI Summary coming soon..."</p>
                                </div>
                            ))}
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
