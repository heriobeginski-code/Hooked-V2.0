<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hooked | Strategic Asset Control</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --bg-deep: #080c1a;
            --accent-indigo: #6366f1;
            --panel-bg: rgba(8, 12, 26, 0.9);
        }
        body {
            margin: 0; background-color: var(--bg-deep);
            font-family: 'Sora', sans-serif; color: white;
            height: 100vh; overflow: hidden;
        }
        /* Dotted Background from your video */
        .gradient-bg {
            position: absolute; inset: 0; z-index: -1;
            background-image: radial-gradient(circle at center, rgba(255,255,255,0.05) 1px, transparent 1px);
            background-size: 20px 20px;
        }
        /* Glass Pill Style */
        .link-pill {
            backdrop-filter: blur(10px);
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.2s ease;
            cursor: grab;
        }
        .link-pill:active { cursor: grabbing; }
        /* Folder Card Style */
        .folder-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .folder-card.drag-over {
            background: rgba(99, 102, 241, 0.2);
            border-color: var(--accent-indigo);
            transform: scale(1.05);
        }
        .modal-blur {
            backdrop-filter: blur(20px);
            background: rgba(8, 12, 26, 0.8);
        }
    </style>
</head>
<body>
    <div class="gradient-bg"></div>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            // State: folders = { "Home Decor": [link1, link2], "Work": [] }
            const [folders, setFolders] = useState(() => {
                const saved = localStorage.getItem('HOOKED_CANVAS_V1');
                return saved ? JSON.parse(saved) : { "Inbox": [] };
            });
            
            const [activeFolder, setActiveFolder] = useState(null); // For the Pop-up
            const [isAddingFolder, setIsAddingFolder] = useState(false);
            const [newFolderName, setNewFolderName] = useState("");

            useEffect(() => {
                localStorage.setItem('HOOKED_CANVAS_V1', JSON.stringify(folders));
            }, [folders]);

            // Extension Handshake Logic
            useEffect(() => {
                const handleMessage = (event) => {
                    if (event.data && event.data.source === 'HOOKED_EXTENSION') {
                        const incoming = event.data.data;
                        const newHook = Array.isArray(incoming) ? incoming[0] : incoming;
                        
                        setFolders(prev => ({
                            ...prev,
                            "Inbox": [newHook, ...prev["Inbox"]]
                        }));
                    }
                };
                window.addEventListener('message', handleMessage);
                return () => window.removeEventListener('message', handleMessage);
            }, []);

            const createFolder = () => {
                if (!newFolderName) return;
                setFolders(prev => ({ ...prev, [newFolderName]: [] }));
                setNewFolderName("");
                setIsAddingFolder(false);
            };

            // Drag and Drop Handlers
            const onDragStart = (e, link, fromFolder) => {
                e.dataTransfer.setData("linkData", JSON.stringify(link));
                e.dataTransfer.setData("fromFolder", fromFolder);
            };

            const onDrop = (e, targetFolderName) => {
                const link = JSON.parse(e.dataTransfer.getData("linkData"));
                const fromFolder = e.dataTransfer.getData("fromFolder");

                if (fromFolder === targetFolderName) return;

                setFolders(prev => {
                    const newFolders = { ...prev };
                    // Remove from old
                    newFolders[fromFolder] = newFolders[fromFolder].filter(item => item.id !== link.id);
                    // Add to new
                    newFolders[targetFolderName] = [link, ...newFolders[targetFolderName]];
                    return newFolders;
                });
            };

            return (
                <div className="h-screen flex flex-col p-8">
                    <header className="flex justify-between items-end mb-12">
                        <div>
                            <h1 className="text-4xl font-extrabold tracking-tighter">HOOKED</h1>
                            <p className="text-indigo-400 font-bold text-[10px] uppercase tracking-widest">Strategic Asset Control</p>
                        </div>
                        <div className="text-right">
                            <p className="text-[10px] text-gray-500 font-bold uppercase">System Status</p>
                            <p className="text-xs font-semibold text-emerald-400">ACTIVE HANDSHAKE</p>
                        </div>
                    </header>

                    {/* MAIN CANVAS: Folder Grid */}
                    <main className="flex-1 grid grid-cols-4 gap-6 overflow-y-auto pb-32">
                        {Object.keys(folders).map(name => (
                            <div 
                                key={name}
                                onDragOver={(e) => { e.preventDefault(); e.currentTarget.classList.add('drag-over'); }}
                                onDragLeave={(e) => e.currentTarget.classList.remove('drag-over')}
                                onDrop={(e) => { e.currentTarget.classList.remove('drag-over'); onDrop(e, name); }}
                                onClick={() => setActiveFolder(name)}
                                className="folder-card p-8 flex flex-col items-center justify-center cursor-pointer relative group"
                            >
                                <div className="w-12 h-12 mb-4 rounded-full bg-indigo-500/20 flex items-center justify-center group-hover:bg-indigo-500/40 transition-colors">
                                    <span className="text-indigo-400 text-xl">📂</span>
                                </div>
                                <h3 className="font-bold text-sm tracking-tight">{name}</h3>
                                <span className="text-[10px] text-gray-500 mt-1 uppercase font-bold">{folders[name].length} items</span>
                            </div>
                        ))}

                        {/* Add Folder Button */}
                        <button 
                            onClick={() => setIsAddingFolder(true)}
                            className="folder-card border-dashed border-gray-700 flex flex-col items-center justify-center hover:border-gray-500 transition-colors"
                        >
                            <span className="text-2xl text-gray-600">+</span>
                            <span className="text-[10px] text-gray-600 font-bold uppercase mt-2">New Folder</span>
                        </button>
                    </main>

                    {/* FOOTER DOCK: New Captures */}
                    <footer className="fixed bottom-0 left-0 right-0 p-8 bg-gradient-to-t from-black to-transparent">
                        <div className="flex gap-4 items-center overflow-x-auto no-scrollbar py-4">
                            <div className="flex-shrink-0 bg-white/5 px-4 py-2 rounded-lg border border-white/10 text-[10px] font-bold text-gray-400 uppercase tracking-widest mr-4">
                                Inbox
                            </div>
                            {folders["Inbox"].map(link => (
                                <div 
                                    key={link.id}
                                    draggable
                                    onDragStart={(e) => onDragStart(e, link, "Inbox")}
                                    className="link-pill px-6 py-3 rounded-full flex items-center gap-3 whitespace-nowrap"
                                >
                                    <span className="font-bold text-xs">{link.brand}</span>
                                    <div className="w-1 h-1 bg-white/20 rounded-full"></div>
                                    <span className="text-[10px] text-gray-500 truncate max-w-[100px]">{link.url}</span>
                                </div>
                            ))}
                        </div>
                    </footer>

                    {/* FOLDER POP-UP (Modal) */}
                    {activeFolder && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-12 modal-blur animate-in fade-in zoom-in duration-300">
                            <div className="bg-gray-900 w-full max-w-2xl rounded-[32px] border border-white/10 p-10 relative shadow-2xl">
                                <button onClick={() => setActiveFolder(null)} className="absolute top-8 right-8 text-gray-500 hover:text-white">✕</button>
                                <h2 className="text-2xl font-bold mb-8 flex items-center gap-4">
                                    <span className="text-indigo-400">📂</span> {activeFolder}
                                </h2>
                                <div className="space-y-3 max-h-[60vh] overflow-y-auto pr-4">
                                    {folders[activeFolder].length === 0 ? (
                                        <p className="text-gray-600 italic">No links in this folder yet.</p>
                                    ) : (
                                        folders[activeFolder].map(link => (
                                            <div key={link.id} className="flex justify-between items-center p-4 bg-white/5 rounded-2xl border border-white/5">
                                                <div className="truncate pr-4">
                                                    <p className="font-bold text-sm">{link.brand}</p>
                                                    <p className="text-[10px] text-gray-500 truncate">{link.url}</p>
                                                </div>
                                                <a href={link.url} target="_blank" className="bg-indigo-600 px-6 py-2 rounded-xl text-[10px] font-bold uppercase">Open</a>
                                            </div>
                                        ))
                                    )}
                                </div>
                            </div>
                        </div>
                    )}

                    {/* ADD FOLDER POP-UP */}
                    {isAddingFolder && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center modal-blur">
                            <div className="bg-gray-900 p-10 rounded-[32px] border border-indigo-500/30 w-96 shadow-2xl">
                                <h2 className="text-lg font-bold mb-6">Create New Folder</h2>
                                <input 
                                    autoFocus
                                    className="w-full bg-black border border-white/10 rounded-xl p-4 text-white mb-6 outline-none focus:border-indigo-500"
                                    placeholder="Folder name (e.g. Home Decor)"
                                    value={newFolderName}
                                    onChange={(e) => setNewFolderName(e.target.value)}
                                    onKeyDown={(e) => e.key === 'Enter' && createFolder()}
                                />
                                <div className="flex gap-4">
                                    <button onClick={() => setIsAddingFolder(false)} className="flex-1 text-gray-500 font-bold text-xs uppercase">Discard</button>
                                    <button onClick={createFolder} className="flex-1 bg-indigo-600 p-4 rounded-xl font-bold text-xs uppercase">Confirm</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
