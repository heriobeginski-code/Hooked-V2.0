<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hooked | Neural Asset Weave</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        :root { --bg-dark: #000000; --accent: #6366f1; }
        body { margin: 0; background-color: var(--bg-dark); font-family: 'Sora', sans-serif; color: white; height: 100vh; overflow: hidden; }
        #canvas-container { position: fixed; inset: 0; z-index: -1; pointer-events: none; }
        .folder-card { backdrop-filter: blur(12px); background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 24px; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .folder-card:hover { background: rgba(255, 255, 255, 0.05); border-color: rgba(99, 102, 241, 0.3); }
        .folder-card.drag-over { background: rgba(99, 102, 241, 0.15); border-color: var(--accent); transform: scale(1.05); }
        .link-pill { backdrop-filter: blur(8px); background: rgba(255, 255, 255, 0.07); border: 1px solid rgba(255, 255, 255, 0.1); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- THE BACKDROP ENGINE (PRESERVING VISUALS) ---
        const ParticleBackdrop = () => {
            const mountRef = useRef(null);
            useEffect(() => {
                const scene = new THREE.Scene();
                const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
                const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
                renderer.setSize(window.innerWidth, window.innerHeight);
                mountRef.current.appendChild(renderer.domElement);

                // Particles: Torus Knot shape like your code
                const geo = new THREE.TorusKnotGeometry(2.5, 0.7, 150, 20);
                const mat = new THREE.PointsMaterial({ size: 0.015, color: 0x6366f1, transparent: true, opacity: 0.6 });
                const points = new THREE.Points(geo, mat);
                scene.add(points);
                camera.position.z = 5;

                const animate = () => {
                    requestAnimationFrame(animate);
                    points.rotation.y += 0.002;
                    points.rotation.x += 0.001;
                    renderer.render(scene, camera);
                };
                animate();

                const handleResize = () => {
                    camera.aspect = window.innerWidth / window.innerHeight;
                    camera.updateProjectionMatrix();
                    renderer.setSize(window.innerWidth, window.innerHeight);
                };
                window.addEventListener('resize', handleResize);
                return () => window.removeEventListener('resize', handleResize);
            }, []);
            return <div ref={mountRef} />;
        };

        function App() {
            // --- CORE LOGIC PRESERVED ---
            const [folders, setFolders] = useState(() => {
                const saved = localStorage.getItem('HOOKED_CANVAS_V1');
                return saved ? JSON.parse(saved) : { "Inbox": [] };
            });
            const [activeFolder, setActiveFolder] = useState(null);
            const [isAddingFolder, setIsAddingFolder] = useState(false);
            const [newFolderName, setNewFolderName] = useState("");

            useEffect(() => {
                localStorage.setItem('HOOKED_CANVAS_V1', JSON.stringify(folders));
            }, [folders]);

            useEffect(() => {
                const handleMessage = (event) => {
                    if (event.data && event.data.source === 'HOOKED_EXTENSION') {
                        const incoming = event.data.data;
                        const newHook = Array.isArray(incoming) ? incoming[0] : incoming;
                        setFolders(prev => ({ ...prev, "Inbox": [newHook, ...prev["Inbox"]] }));
                    }
                };
                window.addEventListener('message', handleMessage);
                return () => window.removeEventListener('message', handleMessage);
            }, []);

            const onDragStart = (e, link, fromFolder) => {
                e.dataTransfer.setData("linkData", JSON.stringify(link));
                e.dataTransfer.setData("fromFolder", fromFolder);
            };

            const onDrop = (e, targetFolderName) => {
                const link = JSON.parse(e.dataTransfer.getData("linkData"));
                const fromFolder = e.dataTransfer.getData("fromFolder");
                if (fromFolder === targetFolderName) return;
                setFolders(prev => {
                    const next = { ...prev };
                    next[fromFolder] = next[fromFolder].filter(item => item.id !== link.id);
                    next[targetFolderName] = [link, ...next[targetFolderName]];
                    return next;
                });
            };

            return (
                <div className="relative h-screen flex flex-col p-10 select-none">
                    <ParticleBackdrop />
                    
                    <header className="flex justify-between items-center mb-16 z-10">
                        <div className="space-y-1">
                            <h1 className="text-4xl font-black tracking-tighter italic text-white">WOVEN</h1>
                            <p className="text-[9px] text-indigo-400 font-bold uppercase tracking-[0.4em]">Asset Intelligence Canvas</p>
                        </div>
                        <button 
                            onClick={() => setIsAddingFolder(true)}
                            className="bg-indigo-600/20 border border-indigo-500/50 text-indigo-200 px-8 py-3 rounded-2xl text-[10px] font-black uppercase tracking-widest hover:bg-indigo-600 hover:text-white transition-all"
                        >
                            + Add Sector
                        </button>
                    </header>

                    <main className="flex-1 grid grid-cols-1 md:grid-cols-4 gap-8 overflow-y-auto no-scrollbar pb-40 z-10">
                        {Object.keys(folders).map(name => (
                            <div 
                                key={name}
                                onDragOver={(e) => { e.preventDefault(); e.currentTarget.classList.add('drag-over'); }}
                                onDragLeave={(e) => e.currentTarget.classList.remove('drag-over')}
                                onDrop={(e) => { e.currentTarget.classList.remove('drag-over'); onDrop(e, name); }}
                                onClick={() => setActiveFolder(name)}
                                className="folder-card p-12 flex flex-col items-center justify-center cursor-pointer group"
                            >
                                <div className="text-4xl mb-4 group-hover:scale-110 transition-transform">📂</div>
                                <h3 className="font-bold text-xs uppercase tracking-widest text-gray-400">{name}</h3>
                                <div className="mt-3 px-3 py-1 bg-white/5 rounded-full text-[9px] text-indigo-400 font-bold">
                                    {folders[name].length} UNITS
                                </div>
                            </div>
                        ))}
                    </main>

                    <footer className="fixed bottom-10 left-10 right-10 z-20">
                        <div className="bg-white/5 backdrop-blur-2xl border border-white/10 p-6 rounded-[32px] flex items-center gap-6 overflow-x-auto no-scrollbar shadow-2xl">
                            <div className="flex-shrink-0 text-[10px] font-black text-indigo-500 uppercase tracking-tighter border-r border-white/10 pr-6">
                                Inbox<br/>Stream
                            </div>
                            {folders["Inbox"].map(link => (
                                <div 
                                    key={link.id}
                                    draggable
                                    onDragStart={(e) => onDragStart(e, link, "Inbox")}
                                    className="link-pill px-6 py-4 rounded-2xl flex flex-col min-w-[160px] active:scale-95 transition-transform"
                                >
                                    <span className="font-black text-[11px] tracking-tight text-white">{link.brand}</span>
                                    <span className="text-[9px] text-gray-500 truncate">{link.url}</span>
                                </div>
                            ))}
                        </div>
                    </footer>

                    {/* FOLDER POPUP */}
                    {activeFolder && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-8 bg-black/80 backdrop-blur-md">
                            <div className="bg-[#080808] w-full max-w-xl rounded-[48px] border border-white/10 p-12 shadow-2xl">
                                <div className="flex justify-between items-center mb-10">
                                    <h2 className="text-2xl font-black tracking-tight uppercase italic">{activeFolder}</h2>
                                    <button onClick={() => setActiveFolder(null)} className="text-gray-500 hover:text-white font-bold">✕</button>
                                </div>
                                <div className="space-y-3 max-h-[40vh] overflow-y-auto no-scrollbar">
                                    {folders[activeFolder].map(link => (
                                        <div className="flex justify-between items-center p-4 bg-white/5 rounded-2xl hover:bg-white/10 transition-colors">
                                            <div className="truncate pr-4">
                                                <p className="font-bold text-xs">{link.brand}</p>
                                                <p className="text-[10px] text-gray-500 truncate">{link.url}</p>
                                            </div>
                                            <a href={link.url} target="_blank" className="bg-indigo-600 px-5 py-2 rounded-xl text-[10px] font-black uppercase tracking-tighter">Launch</a>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}

                    {/* ADD FOLDER */}
                    {isAddingFolder && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/90 backdrop-blur-2xl">
                            <div className="bg-[#080808] p-12 rounded-[48px] border border-indigo-500/30 w-full max-w-sm">
                                <h2 className="text-sm font-black mb-8 uppercase tracking-[0.4em] text-center text-indigo-400">Initialize Sector</h2>
                                <input 
                                    autoFocus
                                    className="w-full bg-black border-b border-white/20 p-5 text-white mb-10 outline-none focus:border-indigo-500 text-center text-lg font-bold"
                                    placeholder="NAME"
                                    value={newFolderName}
                                    onChange={(e) => setNewFolderName(e.target.value)}
                                    onKeyDown={(e) => e.key === 'Enter' && (setFolders(p => ({...p, [newFolderName]:[]})), setIsAddingFolder(false), setNewFolderName(""))}
                                />
                                <div className="flex gap-6">
                                    <button onClick={() => setIsAddingFolder(false)} className="flex-1 text-gray-600 font-bold text-[10px] uppercase">Abort</button>
                                    <button onClick={() => { if(newFolderName) setFolders(p => ({...p, [newFolderName]:[]})); setIsAddingFolder(false); setNewFolderName(""); }} className="flex-1 bg-white text-black p-4 rounded-2xl font-black text-[10px] uppercase tracking-widest">Create</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
