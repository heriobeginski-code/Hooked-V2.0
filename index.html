<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hooked | Live Stream</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-[#F5F5F5] min-h-screen p-8">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [hooks, setHooks] = useState([]);

            useEffect(() => {
                const handleMessage = (event) => {
                    // Check if message is coming from our specific bridge
                    if (event.data.source === 'FROM_HOOKED_EXT') {
                        setHooks(prev => [event.data.payload, ...prev]);
                    } 
                    if (event.data.source === 'FROM_HOOKED_EXT_SYNC') {
                        setHooks(prev => [...event.data.payload, ...prev]);
                    }
                };

                window.addEventListener('message', handleMessage);
                return () => window.removeEventListener('message', handleMessage);
            }, []);

            return (
                <div className="max-w-2xl mx-auto">
                    <h1 className="text-2xl font-bold text-gray-900 mb-8 tracking-tight">Hooked Feed</h1>
                    
                    <div className="space-y-4">
                        {hooks.length === 0 ? (
                            <div className="bg-white p-12 rounded-2xl border border-black/5 text-center text-gray-400 italic">
                                Dashboard is live. Press Alt+S on any tab to hook a URL.
                            </div>
                        ) : (
                            hooks.map(hook => (
                                <div key={hook.id} className="bg-white p-6 rounded-2xl border border-black/5 flex justify-between items-center shadow-sm">
                                    <div>
                                        <div className="text-[10px] font-black tracking-widest text-blue-600 uppercase">{hook.brand}</div>
                                        <div className="text-xs text-gray-400">{new Date(hook.timestamp).toLocaleTimeString()}</div>
                                    </div>
                                    <a href={hook.url} target="_blank" className="bg-gray-900 text-white text-xs px-6 py-2 rounded-full hover:bg-black transition-colors">
                                        Open
                                    </a>
                                </div>
                            ))
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
