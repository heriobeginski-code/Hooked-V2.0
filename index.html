<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hooked Dashboard</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #F5F5F5; }
        .hook-card { transition: transform 0.1s ease, box-shadow 0.2s ease; }
        .hook-card:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05); }
        .hook-card:active { scale: 0.98; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [hooks, setHooks] = useState([]);
            const [search, setSearch] = useState('');

            useEffect(() => {
                // Listen for messages from the Content Script Bridge
                const handleMessage = (event) => {
                    if (event.data.source === 'HOOKED_BRIDGE') {
                        setHooks(prev => [event.data.hook, ...prev]);
                    }
                };
                window.addEventListener('message', handleMessage);
                return () => window.removeEventListener('message', handleMessage);
            }, []);

            const filteredHooks = hooks.filter(h => 
                h.brand.toLowerCase().includes(search.toLowerCase()) || 
                h.url.toLowerCase().includes(search.toLowerCase())
            );

            return (
                <div className="max-w-4xl mx-auto p-8">
                    <header className="flex flex-col md:flex-row justify-between items-center mb-12 gap-4">
                        <h1 className="text-2xl font-semibold tracking-tight text-[#1A1A1A]">Hooked</h1>
                        <div className="relative w-full md:w-64">
                            <input 
                                type="text"
                                placeholder="Search hooks..."
                                className="w-full px-4 py-2 bg-white border border-black/5 rounded-full text-sm focus:outline-none focus:ring-2 focus:ring-black/5"
                                onChange={(e) => setSearch(e.target.value)}
                            />
                        </div>
                    </header>

                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        {filteredHooks.length === 0 ? (
                            <div className="col-span-full text-center py-20 text-[#9E9E9E]">
                                No hooks yet. Press Alt+S on any page to capture.
                            </div>
                        ) : (
                            filteredHooks.map(hook => (
                                <div key={hook.id} className="hook-card bg-white p-6 rounded-2xl border border-black/5 flex justify-between items-center">
                                    <div>
                                        <h3 className="font-semibold text-lg leading-tight">{hook.brand}</h3>
                                        <p className="text-xs text-[#9E9E9E] mt-1 truncate max-w-[200px]">{new URL(hook.url).hostname}</p>
                                    </div>
                                    <a 
                                        href={hook.url} 
                                        target="_blank" 
                                        className="p-3 bg-[#F5F5F5] rounded-full hover:bg-black hover:text-white transition-colors"
                                    >
                                        <i data-lucide="external-link" className="w-5 h-5"></i>
                                    </a>
                                </div>
                            ))
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        
        // Initialize Lucide Icons after render
        setTimeout(() => lucide.createIcons(), 500);
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</body>
</html>
