<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hooked Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #F5F5F5; }
        .hook-card { transition: all 0.2s ease; border: 1px solid rgba(0,0,0,0.05); }
        .hook-card:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [hooks, setHooks] = useState([]);

            useEffect(() => {
                const handleMessage = (event) => {
                    if (event.data.source !== 'HOOKED_BRIDGE') return;

                    if (event.data.type === 'NEW_HOOK') {
                        setHooks(prev => [event.data.hook, ...prev]);
                    } else if (event.data.type === 'FLUSH_HOOKS') {
                        setHooks(prev => [...event.data.hooks, ...prev]);
                    }
                };

                window.addEventListener('message', handleMessage);
                return () => window.removeEventListener('message', handleMessage);
            }, []);

            return (
                <div className="max-w-5xl mx-auto p-8">
                    <header className="flex justify-between items-center mb-12">
                        <h1 className="text-2xl font-semibold text-gray-900 tracking-tight">Hooked</h1>
                        <div className="text-sm text-gray-400">Live Handshake Active</div>
                    </header>

                    {hooks.length === 0 ? (
                        <div className="text-center py-24 bg-white rounded-2xl border border-black/5">
                            <p className="text-gray-400 italic">No hooks yet. Use Alt + S on any tab to capture.</p>
                        </div>
                    ) : (
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                            {hooks.map(hook => (
                                <div key={hook.id} className="hook-card bg-white p-6 rounded-2xl">
                                    <div className="flex justify-between items-start mb-4">
                                        <span className="text-xs font-bold tracking-widest text-gray-400 uppercase">{hook.brand}</span>
                                        <span className="text-[10px] text-gray-300">{new Date(hook.timestamp).toLocaleTimeString()}</span>
                                    </div>
                                    <a 
                                        href={hook.url} 
                                        target="_blank" 
                                        className="inline-block w-full text-center py-3 bg-gray-900 text-white rounded-full text-sm font-medium active:scale-95 transition-transform"
                                    >
                                        Launch
                                    </a>
                                </div>
                            ))}
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
