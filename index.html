<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hooked Dashboard</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #F5F5F5; 
            color: #1A1A1A;
            margin: 0;
        }
        .hook-card { 
            background: white; 
            border: 1px solid rgba(0,0,0,0.05); 
            border-radius: 16px; 
            transition: all 0.2s ease;
        }
        .hook-card:hover { 
            border-color: rgba(0,0,0,0.1);
            transform: translateY(-1px);
        }
        .btn-clear {
            transition: all 0.2s ease;
            border: 1px solid rgba(0,0,0,0.05);
        }
        .btn-clear:hover {
            background-color: #fee2e2;
            color: #dc2626;
            border-color: #fecaca;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            // Load initial state from localStorage if it exists
            const [hooks, setHooks] = useState(() => {
                const saved = localStorage.getItem('hooked_session');
                return saved ? JSON.parse(saved) : [];
            });

            // Save to localStorage whenever hooks change
            useEffect(() => {
                localStorage.setItem('hooked_session', JSON.stringify(hooks));
            }, [hooks]);

            useEffect(() => {
                const handleMessage = (event) => {
                    if (event.data && event.data.type === "NEW_HOOKS") {
                        const incoming = event.data.data;
                        
                        // If it's the full array (on load)
                        if (Array.isArray(incoming)) {
                            setHooks(incoming);
                        } else {
                            // If it's a single item (refined push)
                            setHooks(prev => {
                                // Prevent duplicates in the same session
                                if (prev.find(h => h.id === incoming.id)) return prev;
                                return [incoming, ...prev];
                            });
                        }
                    }
                };

                window.addEventListener('message', handleMessage);
                return () => window.removeEventListener('message', handleMessage);
            }, []);

            const clearAll = () => {
                if (window.confirm("Clear all captured hooks?")) {
                    setHooks([]);
                    localStorage.removeItem('hooked_session');
                }
            };

            return (
                <div className="max-w-2xl mx-auto px-6 py-12">
                    <header className="flex justify-between items-center mb-10">
                        <div>
                            <h1 className="text-2xl font-semibold tracking-tight">Hooked</h1>
                            <p className="text-xs text-gray-400 mt-1 uppercase tracking-widest font-medium">Capture Engine Active</p>
                        </div>
                        
                        <div className="flex items-center gap-3">
                            {hooks.length > 0 && (
                                <button 
                                    onClick={clearAll}
                                    className="btn-clear bg-white text-gray-400 text-[10px] font-bold uppercase tracking-tighter px-3 py-1.5 rounded-lg"
                                >
                                    Clear All
                                </button>
                            )}
                            <div className="px-4 py-1.5 bg-white border border-black/5 rounded-full shadow-sm">
                                <span className="text-xs font-semibold text-gray-400">
                                    {hooks.length}
                                </span>
                            </div>
                        </div>
                    </header>

                    <main className="space-y-3">
                        {hooks.length === 0 ? (
                            <div className="text-center py-20 border-2 border-dashed border-gray-200 rounded-[24px]">
                                <p className="text-gray-400 text-sm font-medium">Ready for your demo capture...</p>
                            </div>
                        ) : (
                            hooks.map((hook) => (
                                <div key={hook.id} className="hook-card p-5 flex justify-between items-center animate-in fade-in slide-in-from-bottom-2">
                                    <div className="overflow-hidden mr-4">
                                        <h2 className="text-base font-semibold text-gray-800">{hook.brand}</h2>
                                        <p className="text-[11px] text-gray-400 truncate max-w-[250px]">{hook.url}</p>
                                    </div>
                                    <a 
                                        href={hook.url} 
                                        target="_blank" 
                                        className="bg-black text-white text-[11px] font-bold px-5 py-2 rounded-xl hover:opacity-80 transition-opacity"
                                    >
                                        OPEN
                                    </a>
                                </div>
                            ))
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
